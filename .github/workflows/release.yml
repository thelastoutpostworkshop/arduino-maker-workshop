name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6

      - name: Extract release notes from changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version $VERSION does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 == "## Version " version { found = 1; next }
            found && /^## Version / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "No release notes found for Version $VERSION in CHANGELOG.md."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --verify-tag
          --title "Arduino Maker Workshop ${GITHUB_REF_NAME}"
          --notes-file release-notes.md
